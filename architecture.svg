  <rect x="30" y="122" width="840" height="30" rx="12" fill="url(#fe)" opacity="0.85"/>
  <rect x="30" y="140" width="840" height="12" fill="url(#fe)" opacity="0.85"/>
  <text x="450" y="141" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="2">BROWSER  —  React 18 + TypeScript + Zustand + @dnd-kit + Tailwind</text>

  <rect x="48" y="162" width="118" height="62" rx="7" fill="#3B2000" stroke="#FCD34D" stroke-width="1"/>
  <text x="107" y="178" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FDE68A">ToolRegistry</text>
  <text x="107" y="192" text-anchor="middle" font-size="7.5" fill="#FEF3C7">CRUD + filter</text>
  <text x="107" y="204" text-anchor="middle" font-size="7.5" fill="#FEF3C7">JSON import/export</text>
  <text x="107" y="216" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Risk badge display</text>

  <rect x="178" y="162" width="118" height="62" rx="7" fill="#3B2000" stroke="#FCD34D" stroke-width="1"/>
