  <text x="380" y="192" text-anchor="middle" font-size="7.5" fill="#FEF3C7">@dnd-kit drag-drop</text>
  <text x="380" y="204" text-anchor="middle" font-size="7.5" fill="#FEF3C7">ALLOWED/DENIED/INHERITED</text>
  <text x="380" y="216" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Real-time validation</text>

  <rect x="465" y="162" width="118" height="62" rx="7" fill="#3B2000" stroke="#FCD34D" stroke-width="1"/>
  <text x="524" y="178" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FDE68A">PolicyExporter</text>
  <text x="524" y="192" text-anchor="middle" font-size="7.5" fill="#FEF3C7">JSON download</text>
  <text x="524" y="204" text-anchor="middle" font-size="7.5" fill="#FEF3C7">YAML download</text>
  <text x="524" y="216" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Python module</text>

