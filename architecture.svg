  <rect x="30" y="406" width="380" height="82" rx="12" fill="#082010" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <text x="220" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#6EE7B7">SQLite (aiosqlite)</text>
  <text x="220" y="441" text-anchor="middle" font-size="8.5" fill="#A7F3D0">Tool · Role · Permission models</text>
  <text x="220" y="453" text-anchor="middle" font-size="8.5" fill="#A7F3D0">3-state: ALLOWED / DENIED / INHERITED</text>
  <text x="220" y="465" text-anchor="middle" font-size="8.5" fill="#A7F3D0">Async sessions via aiosqlite</text>
  <text x="220" y="477" text-anchor="middle" font-size="8.5" fill="#A7F3D0">RiskCategory Python Enum</text>

  <rect x="490" y="406" width="380" height="82" rx="12" fill="#1A1040" stroke="#8B5CF6" stroke-width="1.5" filter="url(#s)"/>
  <text x="680" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#DDD6FE">Anthropic API</text>
  <text x="680" y="441" text-anchor="middle" font-size="8.5" fill="#C4B5FD">claude-sonnet-4-20250514</text>
  <text x="680" y="453" text-anchor="middle" font-size="8.5" fill="#C4B5FD">Agent code analysis (validator)</text>
  <text x="680" y="465" text-anchor="middle" font-size="8.5" fill="#C4B5FD">Sprawl narrative (analyzer)</text>
  <text x="680" y="477" text-anchor="middle" font-size="8.5" fill="#C4B5FD">Heuristic fallback when no key</text>

  <!-- Zustand stores callout -->
  <rect x="30" y="500" width="840" height="60" rx="10" fill="#0A0800" stroke="#4B3500" stroke-width="1"/>
  <text x="200" y="520" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">Zustand Stores</text>
  <rect x="50" y="528" width="100" height="20" rx="5" fill="#1A1000" stroke="#92400E" stroke-width="1"/>
  <text x="100" y="542" text-anchor="middle" font-size="8.5" fill="#FCD34D">toolStore.ts</text>
  <rect x="165" y="528" width="100" height="20" rx="5" fill="#1A1000" stroke="#92400E" stroke-width="1"/>
  <text x="215" y="542" text-anchor="middle" font-size="8.5" fill="#FCD34D">roleStore.ts</text>
  <rect x="280" y="528" width="115" height="20" rx="5" fill="#1A1000" stroke="#92400E" stroke-width="1"/>
  <text x="337" y="542" text-anchor="middle" font-size="8.5" fill="#FCD34D">matrixStore.ts</text>
  <text x="580" y="534" font-size="9" fill="#64748B">22/22 pytest · 110 modules / 276KB · CORS env-configurable</text>
  <text x="580" y="548" font-size="9" fill="#64748B">py_compile gate on Python policy · sprawl sends real cells</text>
