  <text x="80" y="97" font-size="10" font-weight="600" fill="#D97706">Risk Categories:</text>
  <rect x="175" y="84" width="10" height="10" rx="2" fill="#22C55E"/>
  <text x="192" y="95" font-size="9" fill="#86EFAC">read-only</text>
  <rect x="265" y="84" width="10" height="10" rx="2" fill="#EAB308"/>
  <text x="282" y="95" font-size="9" fill="#FEF08A">internal-write</text>
  <rect x="380" y="84" width="10" height="10" rx="2" fill="#F97316"/>
  <text x="397" y="95" font-size="9" fill="#FDBA74">external-api</text>
  <rect x="480" y="84" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="497" y="95" font-size="9" fill="#FCA5A5">financial</text>
  <rect x="560" y="84" width="10" height="10" rx="2" fill="#DC2626"/>
  <text x="577" y="95" font-size="9" fill="#FCA5A5">destructive</text>
  <rect x="660" y="84" width="10" height="10" rx="2" fill="#991B1B"/>
  <text x="677" y="95" font-size="9" fill="#FCA5A5">administrative</text>

