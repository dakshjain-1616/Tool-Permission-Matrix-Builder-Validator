  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#FEF3C7" letter-spacing="0.5">Tool Permission Matrix</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#92400E">Async FastAPI · React + Zustand + @dnd-kit · Policy Export · Claude Agent Validation</text>
  <line x1="80" y1="66" x2="820" y2="66" stroke="#3B2500" stroke-width="1.5"/>

