  <text x="142" y="333" text-anchor="middle" font-size="8" fill="#FEE2E2">CRUD: tools, roles, permissions</text>
  <text x="142" y="345" text-anchor="middle" font-size="8" fill="#FEE2E2">GET /api/matrix (all cells)</text>
  <text x="142" y="357" text-anchor="middle" font-size="8" fill="#FEE2E2">GET /api/health · CORS env-config</text>

  <rect x="250" y="303" width="185" height="64" rx="8" fill="#3B0808" stroke="#FCA5A5" stroke-width="1"/>
  <text x="342" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">policy_generator.py</text>
  <text x="342" y="333" text-anchor="middle" font-size="8" fill="#FEE2E2">JSON / YAML output</text>
  <text x="342" y="345" text-anchor="middle" font-size="8" fill="#FEE2E2">Python module + py_compile</text>
  <text x="342" y="357" text-anchor="middle" font-size="8" fill="#FEE2E2">check_permission(role, tool)</text>

  <rect x="450" y="303" width="185" height="64" rx="8" fill="#3B0808" stroke="#FCA5A5" stroke-width="1"/>
  <text x="542" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">agent_validator.py</text>
  <text x="542" y="333" text-anchor="middle" font-size="8" fill="#FEE2E2">Regex tool extraction</text>
  <text x="542" y="345" text-anchor="middle" font-size="8" fill="#FEE2E2">Claude or heuristic path</text>
  <text x="542" y="357" text-anchor="middle" font-size="8" fill="#FEE2E2">Security score + issues</text>

  <rect x="650" y="303" width="185" height="64" rx="8" fill="#3B0808" stroke="#FCA5A5" stroke-width="1"/>
  <text x="742" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">sprawl_analyzer.py</text>
  <text x="742" y="333" text-anchor="middle" font-size="8" fill="#FEE2E2">Real cell permissions map</text>
  <text x="742" y="345" text-anchor="middle" font-size="8" fill="#FEE2E2">Over-exposure metrics</text>
  <text x="742" y="357" text-anchor="middle" font-size="8" fill="#FEE2E2">Claude or numeric fallback</text>

