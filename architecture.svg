  <text x="659" y="178" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FDE68A">AgentValidator</text>
  <text x="659" y="192" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Paste/upload code</text>
  <text x="659" y="204" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Claude analysis</text>
  <text x="659" y="216" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Security score</text>

  <rect x="735" y="162" width="122" height="62" rx="7" fill="#3B2000" stroke="#FCD34D" stroke-width="1"/>
  <text x="796" y="178" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FDE68A">SprawlAnalysis</text>
  <text x="796" y="192" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Cell → permissions map</text>
  <text x="796" y="204" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Over-exposure detect</text>
  <text x="796" y="216" text-anchor="middle" font-size="7.5" fill="#FEF3C7">Sprawl score 0-100</text>

